name: Playwright E2E Tests

# Manual trigger only — not activated for CI yet
# To enable on PR/push, add: pull_request / push triggers
on:
  workflow_dispatch:
    inputs:
      headed:
        description: 'Run in headed mode (for debugging)'
        required: false
        default: 'false'
        type: boolean

jobs:
  e2e:
    name: E2E Tests (Chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # TODO: Add database service container when ready
    # services:
    #   postgres:
    #     image: postgis/postgis:15-3.4
    #     env:
    #       POSTGRES_USER: e2e_user
    #       POSTGRES_PASSWORD: e2e_password
    #       POSTGRES_DB: territory_plan_e2e
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      # TODO: Add database setup steps
      # - name: Run Prisma migrations
      #   run: npx prisma migrate deploy
      #   env:
      #     DATABASE_URL: postgresql://e2e_user:e2e_password@localhost:5432/territory_plan_e2e

      - name: Build application
        run: npm run build
        env:
          # TODO: Add required env vars as GitHub secrets
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          # TODO: Add all required env vars
          # DATABASE_URL: postgresql://e2e_user:e2e_password@localhost:5432/territory_plan_e2e
          # NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          # NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results
          path: e2e/test-results/
          retention-days: 7
