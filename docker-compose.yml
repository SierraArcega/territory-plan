services:
  db:
    image: postgis/postgis:15-3.4
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: territory
      POSTGRES_PASSWORD: territory_dev
      POSTGRES_DB: territory_plan
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U territory -d territory_plan"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    build: ./scheduler
    container_name: tp_scheduler
    profiles: ["scheduler"]
    environment:
      - OPENSEARCH_HOST=${OPENSEARCH_HOST}
      - OPENSEARCH_USERNAME=${OPENSEARCH_USERNAME}
      - OPENSEARCH_PASSWORD=${OPENSEARCH_PASSWORD}
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
    volumes:
      - ./scheduler:/app
      - scheduler_logs:/app/logs
    command: python -u /app/run_scheduler.py
    restart: unless-stopped

  tp_monitor:
    build:
      context: ./scheduler
      dockerfile: Dockerfile.monitor
    container_name: tp_monitor
    profiles: ["scheduler"]
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - scheduler_logs:/app/logs
    restart: unless-stopped

volumes:
  pgdata:
  scheduler_logs:
