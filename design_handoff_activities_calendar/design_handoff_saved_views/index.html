<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Saved Views — Mapomatic</title>
<link rel="stylesheet" href="design-system/colors_and_type.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #FFFCFA; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: #403770; }
  #root { height: 100vh; width: 100vw; }
  *, *::before, *::after { box-sizing: border-box; }
  .fm-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
  .fm-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .fm-scrollbar::-webkit-scrollbar-thumb { background: #D4CFE2; border-radius: 999px; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-system/IconSystem.jsx"></script>
<script type="text/babel" src="design-system/Primitives.jsx"></script>
<script type="text/babel" src="app-shared.jsx"></script>
<script type="text/babel" src="app-folk.jsx"></script>
<script type="text/babel" src="app-unified.jsx"></script>
<script type="text/babel" src="list-builder.jsx"></script>
<script type="text/babel" src="district-panel.jsx"></script>
<script type="text/babel" src="detail-panel.jsx"></script>
<script type="text/babel" src="district-feeds.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
  const { UnifiedApp, TweaksPanel, useTweaks, TweakSection, TweakRadio } = window;

  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "density": "compact"
  }/*EDITMODE-END*/;

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
    return (
      <>
        <UnifiedApp density={t.density} />
        <TweaksPanel title="Tweaks">
          <TweakSection title="Sidebar">
            <TweakRadio label="Density" value={t.density} onChange={(v) => setTweak('density', v)}
              options={[{ value: 'compact', label: 'Compact' }, { value: 'comfortable', label: 'Comfortable' }]}/>
          </TweakSection>
        </TweaksPanel>
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
